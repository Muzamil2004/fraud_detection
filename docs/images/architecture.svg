<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640">
  <rect width="1200" height="640" fill="#eef3f8"/>
  <text x="40" y="56" font-family="Segoe UI, Arial, sans-serif" font-size="34" fill="#10243b" font-weight="700">Credit Card Fraud Detection - System Architecture</text>

  <rect x="60" y="110" rx="16" ry="16" width="280" height="120" fill="#ffffff" stroke="#9bb4cc" stroke-width="2"/>
  <text x="86" y="158" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#15314d" font-weight="700">Dataset (CSV)</text>
  <text x="86" y="190" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#37536f">data/credit_card_fraud_10k.csv</text>

  <rect x="410" y="80" rx="16" ry="16" width="350" height="170" fill="#ffffff" stroke="#9bb4cc" stroke-width="2"/>
  <text x="438" y="126" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#15314d" font-weight="700">Training Pipeline</text>
  <text x="438" y="160" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#37536f">Feature Engineering + Preprocessing</text>
  <text x="438" y="186" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#37536f">Stratified CV + RandomizedSearchCV</text>
  <text x="438" y="212" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#37536f">Best Model Selection</text>

  <rect x="830" y="110" rx="16" ry="16" width="290" height="120" fill="#ffffff" stroke="#9bb4cc" stroke-width="2"/>
  <text x="858" y="158" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#15314d" font-weight="700">Model Artifact</text>
  <text x="858" y="190" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#37536f">model.pkl (joblib)</text>

  <rect x="410" y="320" rx="16" ry="16" width="350" height="190" fill="#ffffff" stroke="#9bb4cc" stroke-width="2"/>
