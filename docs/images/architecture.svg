  <text x="438" y="400" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#37536f">/health, /model-info</text>
  <text x="438" y="426" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#37536f">/predict, /predict/batch</text>
  <text x="438" y="452" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#37536f">runtime cache + thresholding</text>

  <rect x="830" y="350" rx="16" ry="16" width="290" height="140" fill="#ffffff" stroke="#9bb4cc" stroke-width="2"/>
  <text x="858" y="394" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#15314d" font-weight="700">Frontend UI</text>
  <text x="858" y="426" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#37536f">Operational dashboard</text>
  <text x="858" y="452" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#37536f">Single + Batch scoring</text>

  <line x1="340" y1="170" x2="410" y2="170" stroke="#3f6f95" stroke-width="3"/>
  <polygon points="410,170 398,162 398,178" fill="#3f6f95"/>

